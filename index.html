<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shreyash Pattewar | Mobile &amp; AI Developer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="static/css/base.css?v=2" />
  <link rel="stylesheet" href="static/css/components.css?v=2" />
  <link rel="stylesheet" href="static/css/responsive.css?v=2" />
</head>
<body>
  <div id="bg-blobs" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="blob b5"></div>
    <div class="blob b6"></div>
    <div id="cursor-glow"></div>
  </div>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo">SP</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#skills" class="nav-link">Skills</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
        <li><a href="#github" class="nav-link">GitHub</a></li>
        <li><a href="#blog" class="nav-link">Blog</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    <section class="hero" id="hero">
      <div class="hero-content">
        <p class="hero-greeting">Hi, I'm</p>
        <h1 class="hero-name" id="heroName"></h1>
        <h2 class="hero-role">
          <span class="typewriter" id="typewriter"></span>
          <span class="cursor">|</span>
        </h2>
        <p class="hero-tagline" id="heroTagline"></p>
        <div class="hero-cta">
          <a href="#projects" class="btn btn-primary">View Projects</a>
          <a href="static/assets/resume.pdf" class="btn btn-secondary" target="_blank" rel="noopener">Download Resume</a>
        </div>
      </div>
    </section>

    <section class="section about" id="about">
      <div class="container">
        <h2 class="section-title reveal">About Me</h2>
        <div class="about-grid">
          <div class="about-avatar reveal">
            <img src="static/assets/profile.png" alt="Shreyash Pattewar" class="avatar-img" />
          </div>
          <div class="about-text reveal" id="aboutText"></div>
        </div>
        <div class="about-socials" id="aboutSocials"></div>
      </div>
    </section>

    <section class="section skills" id="skills">
      <div class="container">
        <h2 class="section-title reveal">Skills &amp; Tech Stack</h2>
        <div id="skillsContainer"></div>
      </div>
    </section>

    <section class="section projects" id="projects">
      <div class="container">
        <h2 class="section-title reveal">Projects</h2>
        <div class="project-grid" id="projectsContainer"></div>
      </div>
    </section>

    <section class="section blog" id="blog">
      <div class="container">
        <h2 class="section-title reveal">Latest Posts</h2>
        <div class="blog-scroll" id="blogContainer"></div>
      </div>
    </section>

    <section class="section contact" id="contact">
      <div class="container">
        <h2 class="section-title reveal">Get In Touch</h2>
        <div class="contact-grid">
          <form class="contact-form reveal" id="contactForm" action="https://formsubmit.co/shreyashp47@gmail.com" method="POST">
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_template" value="table" />
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Your Email" required />
            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
          <div class="contact-info reveal">
            <div class="contact-details" id="contactDetails"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="section github" id="github">
      <div class="container">
        <h2 class="section-title reveal">GitHub Stats</h2>
        <div class="github-stats reveal" id="githubStats"></div>
        <div class="repo-grid" id="repoGrid">
          <p class="loading-text">Loading repositories...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p id="footerText"></p>
      <a href="#hero" class="back-to-top" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
      </a>
    </div>
  </footer>

  <script src="static/js/config.js?v=2"></script>
  <script src="static/js/effects.js?v=2"></script>
  <script src="static/js/render.js?v=2"></script>
  <script src="static/js/navigation.js?v=2"></script>
  <script src="static/js/main.js?v=2"></script>
</body>
</html>
